<header class="app-header">
  <div class="header-left">
    Online players: {{ online_count() }}
  </div>

  <div class="header-center">
    <h1>Quantum Minesweeper <span class="mine-icon">💣</span></h1>
  </div>

  <div class="header-right">

    {% if FEATURES.ENABLE_TUTORIAL and FEATURES.TUTORIAL_URL %}
      <a class="header-action" href="{{ FEATURES.TUTORIAL_URL }}" target="_blank" rel="noopener" title="Open tutorial" aria-label="Open tutorial">📖</a>
    {% endif %}

    {% if FEATURES.ENABLE_ABOUT %}
    <a href="{{ ABOUT_HREF | default('/about') }}" class="header-action" title="About Quantum Minesweeper" aria-label="About Quantum Minesweeper">ℹ️</a>
    {% endif %}

    {% if FEATURES.ENABLE_HELP %}
      <button id="toggle-help" class="header-action" type="button" title="Toggle Help" aria-label="Toggle Help">❓</button>
    {% endif %}

    <button id="toggle-theme" class="header-action" type="button" title="Toggle theme" aria-label="Toggle theme">🌙</button>
  </div>
</header>
